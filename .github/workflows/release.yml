name: Release

# Tag-triggered release builds. Produces an UNSIGNED macOS installer (.dmg)
# and .zip for the pushed tag.
#
# macOS only: GreyChrist only ships for macOS for the foreseeable future.
# `macos-latest` runs on Apple Silicon, so the output is arm64. Add a
# `macos-13` runner to the matrix if Intel coverage is needed later.
#
# Signing: this workflow does NOT sign the artifacts. macOS Gatekeeper will
# block the first launch; users need to right-click → Open. Wire up
# APPLE_ID / APPLE_ID_PASSWORD / APPLE_TEAM_ID secrets and configure
# notarization in forge.config.ts once the Apple Developer ID is in place.

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write  # needed to create the GitHub Release

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (macos-latest, arm64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run check

      - name: Tests with coverage gate
        run: npm run test:coverage

      - name: Build macOS installer — UNSIGNED
        run: npm run make

      - name: Collect installer artifacts
        shell: bash
        run: |
          mkdir -p dist-artifacts
          # Electron Forge writes makers' output under out/make/**
          find out/make -type f \( -name '*.dmg' -o -name '*.zip' \) \
            -exec cp {} dist-artifacts/ \;
          ls -la dist-artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: greychrist-macos-${{ github.ref_name }}
          path: dist-artifacts/**

  release:
    name: Publish GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download macOS build artifact
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: greychrist-macos-*
          merge-multiple: true

      - name: Extract release notes for this tag
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          # Pull the section between `## [X.Y.Z]` and the next `## [`
          awk -v tag="$TAG" '
            $0 ~ "^## \\[" tag "\\]" { capture=1; next }
            capture && /^## \[/ { capture=0 }
            capture { print }
          ' CHANGELOG.md > release-body.md
          if [ ! -s release-body.md ]; then
            echo "Release $TAG" > release-body.md
            echo "" >> release-body.md
            echo "No CHANGELOG entry found — see commit history." >> release-body.md
          fi
          echo "" >> release-body.md
          echo "---" >> release-body.md
          echo "" >> release-body.md
          echo "> ⚠ **Unsigned macOS build (Apple Silicon).** On first launch, macOS Gatekeeper will block the app. Right-click the app → Open → confirm the \"unidentified developer\" warning. Signing will be enabled once the Apple Developer ID is set up." >> release-body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release-body.md
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: release-assets/**
