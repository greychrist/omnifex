name: Release

# Tag-triggered release builds. Produces UNSIGNED installers on Linux, macOS,
# and Windows and attaches them to a GitHub Release for the pushed tag.
#
# Signing: this workflow does NOT sign the artifacts. macOS output will be
# blocked by Gatekeeper on first launch; Windows will be warned by SmartScreen.
# Swap in APPLE_ID / APPLE_ID_PASSWORD / APPLE_TEAM_ID + Windows cert secrets
# and wire them into forge.config.ts once signing credentials are in place —
# the release signing memory in the personal memory dir tracks when this gets
# unblocked.

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write  # needed to create the GitHub Release

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run check

      - name: Tests with coverage gate
        run: npm run test:coverage

      - name: Build installers — UNSIGNED
        run: npm run make

      - name: Collect installer artifacts
        shell: bash
        run: |
          mkdir -p dist-artifacts
          # Electron Forge writes makers' output under out/make/**
          find out/make -type f \( \
            -name '*.dmg' -o \
            -name '*.zip' -o \
            -name '*.exe' -o \
            -name '*.nupkg' -o \
            -name '*.deb' -o \
            -name '*.rpm' -o \
            -name '*.AppImage' \
          \) -exec cp {} dist-artifacts/ \;
          ls -la dist-artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: greychrist-${{ matrix.os }}-${{ github.ref_name }}
          path: dist-artifacts/**

  release:
    name: Publish GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: greychrist-*
          merge-multiple: true

      - name: Extract release notes for this tag
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          # Pull the section between `## [X.Y.Z]` and the next `## [`
          awk -v tag="$TAG" '
            $0 ~ "^## \\[" tag "\\]" { capture=1; next }
            capture && /^## \[/ { capture=0 }
            capture { print }
          ' CHANGELOG.md > release-body.md
          if [ ! -s release-body.md ]; then
            echo "Release $TAG" > release-body.md
            echo "" >> release-body.md
            echo "No CHANGELOG entry found — see commit history." >> release-body.md
          fi
          echo "" >> release-body.md
          echo "---" >> release-body.md
          echo "" >> release-body.md
          echo "> ⚠ **Unsigned build.** macOS will require right-click → Open on first launch; Windows SmartScreen will warn. Signing is not yet configured." >> release-body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release-body.md
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: release-assets/**
