# Message Rendering Config — v5 Reference
#
# This file documents the LIVE config model that drives the renderer via
# resolveKind(). Source of truth: src/lib/messageRenderingConfig.ts.
# Date: 2026-05-31.
#
# Stored in the database as JSON under the key `message_rendering_config`.
# Read/written via api.saveSetting(MESSAGE_RENDERING_CONFIG_KEY, ...).
# Parsed with parseConfig() / mergeConfig(); saved configs with version != 5
# are fully discarded and replaced with fresh defaults on load (no migration).
#
# ─────────────────────────────────────────────────────────────────────────────
# CONFIG SHAPE (v5)
# ─────────────────────────────────────────────────────────────────────────────
#
# version: 5                        # must be exactly 5; mismatch → full reset
# defaultViewMode: verbose | compact
# categories:                       # full CategoryStyle for user / agent / system
#   user:   { ...CategoryStyle }
#   agent:  { ...CategoryStyle }
#   system: { ...CategoryStyle }
# kinds:                            # SPARSE — user patches only; most IDs absent
#   "assistant.text": { ...Partial<KindStyle> }
#   # ... (only IDs the user has overridden appear here)
# palette:                          # PaletteName → PaletteEntry (border/bg/swatch)
#   primary: { border: "...", bg: "...", swatch: "#..." }
#   # ...
# typography:
#   header:  { typeface, size, weight, italic }
#   content: { typeface, size, weight, italic }
#   icon:    { bordered, bgOpacity }
# terminal:
#   typeface: <mono typeface id>
#   fontSize: 13          # px, clamped [8, 32]
#   cursorStyle: block | underline | bar
# hardFilters:
#   hidePartialStreaming: false
#   hideSubagentLifecycle: false
#   hideHookLifecycle: false
#   hideRateLimitNotices: false
# debug:
#   showCardKindLabel: false
#
# ─────────────────────────────────────────────────────────────────────────────
# RESOLUTION — resolveKind(config, id)
# ─────────────────────────────────────────────────────────────────────────────
#
# Three layers merged left-to-right (later layers win):
#   1. config.categories[categoryOf(id)]    — category base style
#   2. KIND_REGISTRY[id].default            — built-in per-kind chrome (in code)
#   3. config.kinds[id]                     — sparse user patch (may be absent)
#
# categoryOf(id): returns KIND_REGISTRY[id].category, falling back to "system"
# for any unrecognized id.
#
# There is NO match engine, NO overrides array, NO condition/operator DSL,
# NO $kind/$category selectors, and NO KNOWN_KIND_IDS list. Kind identity is
# the registry key string, looked up directly.
#
# ─────────────────────────────────────────────────────────────────────────────
# KindStyle FIELDS
# ─────────────────────────────────────────────────────────────────────────────
#
# These fields are shared by CategoryStyle and KIND_REGISTRY entries.
# Identity fields (id, label, description) are NOT part of KindStyle.
#
# Field              Type / allowed values
# ─────────────────  ──────────────────────────────────────────────────────────
# presentation       "card" | "side-line" | "collapsible"
# accentColor        PaletteName ("primary" | "blue" | "amber" | "green" |
#                    "red" | "gray" | "muted" | "info" | "sysInit" | "purple" |
#                    "orange" | "teal" | "pink" | "indigo" | "cyan" | "yellow" |
#                    "lime" | "brown" | "chocolate" | "tan" | "black")
#                    OR a CSS hex color (#rgb | #rrggbb | #rrggbbaa)
# icon               IconName — one of the allowed Lucide icon names or unicode
#                    glyphs ("ℹ" | "✗" | "⚠" | "none"); see ALLOWED_ICONS in
#                    src/lib/messageRenderingConfig.ts for the full list
# headerLabel        string | null   (null → no header label rendered)
# borderStyle        "solid" | "dashed"
# alignment          "left" | "right" | "full"
# hiddenInCompact    boolean  — hidden in compact view mode
# compactBoundaryLocked  boolean?  — always a compact boundary even when hidden
# widget             string?  — named widget that owns card body rendering
# showRawPayload     boolean?  — render raw JSON payload below the card body
# iconBordered       boolean?  — icon rendered in a bordered chip (per-kind override)
# iconBgOpacity      number? (0-100)  — chip bg opacity when iconBordered is true
#
# ─────────────────────────────────────────────────────────────────────────────
# CATEGORY DEFAULTS  (DEFAULT_CATEGORIES)
# ─────────────────────────────────────────────────────────────────────────────

categories:
  user:
    label: "User"
    description: "Your prompts, commands, tool results, injected context."
    presentation: card
    accentColor: blue
    icon: User
    headerLabel: "You"
    borderStyle: solid
    alignment: right
    hiddenInCompact: false

  agent:
    label: "Agent"
    description: "Claude's text, thinking, tool calls, completions."
    presentation: card
    accentColor: primary
    icon: Bot
    headerLabel: "Claude"
    borderStyle: solid
    alignment: left
    hiddenInCompact: false

  system:
    label: "System"
    description: "Notifications, hooks, errors, lifecycle, prompts."
    presentation: card
    accentColor: muted
    icon: Info
    headerLabel: null
    borderStyle: solid
    alignment: left
    hiddenInCompact: true

# ─────────────────────────────────────────────────────────────────────────────
# KIND CATALOG  (KIND_REGISTRY — every registered id)
# ─────────────────────────────────────────────────────────────────────────────
#
# Grouped by category. Each entry shows the id, label, one-line purpose, and
# notable default chrome from KIND_REGISTRY[id].default.
# Fields absent from "default" inherit from the category base via resolveKind.
# The kinds: map in a saved config need only contain ids the user has patched.

kinds:

  # ── agent ──────────────────────────────────────────────────────────────────

  assistant.text:
    label: "Assistant text"
    purpose: "Claude's reply text."
    default: {}   # inherits all chrome from agent category base

  assistant.text.endTurn:
    label: "Execution complete"
    purpose: "Final assistant text that ended the turn."
    default:
      accentColor: green
      icon: CheckCircle2
      compactBoundaryLocked: true

  assistant.thinking:
    label: "Thinking"
    purpose: "Extended-thinking blocks."
    default:
      presentation: collapsible
      headerLabel: "Thinking"
      icon: Brain
      widget: ThinkingWidget
      hiddenInCompact: true

  assistant.tool-use:
    label: "Tool call"
    purpose: "Claude invoking a tool."
    default:
      accentColor: info
      icon: Terminal
      headerLabel: null
      hiddenInCompact: true

  assistant.askUserQuestion:
    label: "Question (answered)"
    purpose: "An answered AskUserQuestion card."
    default:
      presentation: card
      icon: MessageCircleQuestion
      accentColor: indigo
      hiddenInCompact: false

  # ── user ───────────────────────────────────────────────────────────────────

  user.prompt:
    label: "User prompt"
    purpose: "What you typed."
    default:
      compactBoundaryLocked: true

  user.command:
    label: "Slash command"
    purpose: "A /command you ran."
    default:
      presentation: side-line
      icon: ChevronRight
      alignment: left

  user.commandOutput:
    label: "Command output"
    purpose: "Local stdout from a slash command."
    default:
      presentation: side-line
      alignment: left
      hiddenInCompact: true

  user.subagentPrompt:
    label: "Subagent prompt"
    purpose: "A prompt generated for a subagent."
    default:
      icon: Bot
      accentColor: amber
      alignment: left

  user.skillInjection:
    label: "Skill injection"
    purpose: "Skill body injected into the conversation."
    default:
      presentation: collapsible
      icon: Sparkles
      accentColor: purple
      alignment: left

  user.systemContext:
    label: "System context"
    purpose: "Hook feedback, system-reminders, skill preambles."
    default:
      presentation: collapsible
      icon: Sparkles
      accentColor: purple
      showRawPayload: true
      alignment: left
      hiddenInCompact: false

  user.sdkSystemBracket:
    label: "System notice"
    purpose: "CLI bracket notices like [Request interrupted]."
    default:
      presentation: side-line
      icon: Info
      alignment: left

  user.tool-result:
    label: "Tool result"
    purpose: "Output returned from a tool call."
    default:
      presentation: side-line
      headerLabel: null
      alignment: left
      hiddenInCompact: true

  user.image:
    label: "Image"
    purpose: "A pasted or attached image."
    default:
      icon: Image
      alignment: left

  # ── system ─────────────────────────────────────────────────────────────────

  system.notification.info:
    label: "Notification (info)"
    purpose: "Informational CLI notification."
    default:
      icon: Bell
      presentation: card
      hiddenInCompact: false

  system.notification.warn:
    label: "Notification (warn)"
    purpose: "Warning CLI notification."
    default:
      accentColor: amber
      icon: Bell
      presentation: card
      hiddenInCompact: false

  system.notification.error:
    label: "Notification (error)"
    purpose: "Error CLI notification."
    default:
      accentColor: red
      icon: Bell
      presentation: card
      hiddenInCompact: false

  system.notification.stop:
    label: "Notification (stop)"
    purpose: "Stop CLI notification."
    default:
      accentColor: red
      icon: Bell
      presentation: card
      hiddenInCompact: false

  system.hook_started:
    label: "Hook started"
    purpose: "A hook began running."
    default:
      icon: Hook

  system.hook_response:
    label: "Hook response"
    purpose: "A hook returned."
    default:
      icon: Hook

  system.permission_denied:
    label: "Permission denied"
    purpose: "A tool permission was denied."
    default:
      accentColor: red
      icon: ShieldX
      presentation: card
      hiddenInCompact: false

  system.userPromptSubmit:
    label: "Prompt submitted"
    purpose: "UserPromptSubmit lifecycle envelope."
    default:
      icon: Send

  system.api_error:
    label: "API error"
    purpose: "An API or tool error."
    default:
      accentColor: red
      icon: AlertTriangle
      presentation: card
      hiddenInCompact: false

  system.unknown:
    label: "System (other)"
    purpose: "Any unrecognized system subtype."
    default:
      icon: Info

  permission.request:
    label: "Permission request"
    purpose: "Live tool-permission prompt."
    default:
      presentation: card
      icon: ShieldQuestion
      accentColor: amber
      hiddenInCompact: false

  permission.askUserQuestion:
    label: "Question (live)"
    purpose: "Live AskUserQuestion prompt."
    default:
      presentation: card
      icon: MessageCircleQuestion
      accentColor: indigo
      hiddenInCompact: false

  summary.compaction:
    label: "Conversation summary"
    purpose: "Compaction summary card."
    default:
      icon: FileText
      presentation: card
      widget: SummaryWidget
      hiddenInCompact: false
      compactBoundaryLocked: true

  unknown:
    label: "Unknown"
    purpose: "Unclassifiable message — shows raw payload."
    default:
      presentation: side-line
      icon: HelpCircle
      accentColor: orange
      borderStyle: dashed
      headerLabel: "Unknown"
      hiddenInCompact: false
      compactBoundaryLocked: true
      showRawPayload: true

# ─────────────────────────────────────────────────────────────────────────────
# PALETTE  (DEFAULT_PALETTE — all 21 named entries)
# ─────────────────────────────────────────────────────────────────────────────
#
# Each entry has three fields:
#   border  — Tailwind class fragment used for the card's border color
#   bg      — Tailwind class fragment, rgba() value, or null for no background
#   swatch  — Hex string used for the color swatch in the editor UI
#
# accentColor on any KindStyle or CategoryStyle references one of these names
# OR a raw CSS hex color (#rgb / #rrggbb / #rrggbbaa).

palette:
  primary:    { border: "primary/20",            bg: "primary/5",                  swatch: "#8b8b8b" }
  blue:       { border: "blue-400/30",           bg: "rgba(96,165,250,0.10)",      swatch: "#60a5fa" }
  amber:      { border: "amber-500/30",          bg: "rgba(245,158,11,0.12)",      swatch: "#f59e0b" }
  green:      { border: "green-500/20",          bg: "green-500/5",                swatch: "#22c55e" }
  red:        { border: "destructive/20",        bg: "destructive/5",              swatch: "#ef4444" }
  gray:       { border: "gray-500/20",           bg: "gray-500/5",                 swatch: "#6b7280" }
  muted:      { border: "border/30",             bg: "muted/30",                   swatch: "#4b5563" }
  info:       { border: "muted-foreground/30",   bg: null,                         swatch: "#9ca3af" }
  sysInit:    { border: "blue-500/20",           bg: "blue-500/5",                 swatch: "#3b82f6" }
  purple:     { border: "purple-500/30",         bg: "purple-500/5",               swatch: "#a855f7" }
  orange:     { border: "orange-500/30",         bg: "orange-500/5",               swatch: "#f97316" }
  teal:       { border: "teal-500/30",           bg: "teal-500/5",                 swatch: "#14b8a6" }
  pink:       { border: "pink-500/30",           bg: "pink-500/5",                 swatch: "#ec4899" }
  indigo:     { border: "indigo-500/30",         bg: "indigo-500/5",               swatch: "#6366f1" }
  cyan:       { border: "cyan-500/30",           bg: "cyan-500/5",                 swatch: "#06b6d4" }
  yellow:     { border: "yellow-500/30",         bg: "yellow-500/5",               swatch: "#eab308" }
  lime:       { border: "lime-500/30",           bg: "lime-500/5",                 swatch: "#84cc16" }
  brown:      { border: "amber-900/30",          bg: "amber-900/5",                swatch: "#92400e" }
  chocolate:  { border: "amber-950/30",          bg: "amber-950/5",                swatch: "#78350f" }
  tan:        { border: "amber-300/30",          bg: "amber-300/5",                swatch: "#d4a574" }
  black:      { border: "neutral-900/30",        bg: "neutral-900/5",              swatch: "#171717" }

# ─────────────────────────────────────────────────────────────────────────────
# TYPOGRAPHY
# ─────────────────────────────────────────────────────────────────────────────
#
# Global typography applied to every message kind — not per-kind overridable.
# Two text slots (header / content) plus icon chip settings.
#
# TypographyStyle fields:
#   typeface  — catalog ID from src/lib/typefaceCatalog.ts
#   size      — "xs" | "sm" | "base" | "lg"
#   weight    — "thin" | "extralight" | "light" | "normal" | "medium" |
#               "semibold" | "bold" | "extrabold" | "black"
#   italic    — boolean
#
# IconStyle fields:
#   bordered    — when true, the icon renders inside a bordered chip that
#                 punches out of the card's tinted accent
#   bgOpacity   — 0-100; chip background opacity when bordered is true;
#                 ignored when bordered is false

typography:
  header:  { typeface: inter, size: sm, weight: semibold, italic: false }
  content: { typeface: inter, size: sm, weight: normal,   italic: false }
  icon:    { bordered: true, bgOpacity: 100 }

# ─────────────────────────────────────────────────────────────────────────────
# TERMINAL
# ─────────────────────────────────────────────────────────────────────────────
#
# Settings for the xterm surface in TUI mode.
# fontSize is clamped to [8, 32] px on load; out-of-range values are corrected.

terminal:
  typeface: jetbrains-mono
  fontSize: 13
  cursorStyle: block      # block | underline | bar

# ─────────────────────────────────────────────────────────────────────────────
# HARD FILTERS
# ─────────────────────────────────────────────────────────────────────────────
#
# Live overlay filters applied to CLI overlay channels (Chat mode only).
# These suppress entire event classes before they reach the message stream.
#
#   hidePartialStreaming   — stream_event (typewriter / partial-text events)
#   hideSubagentLifecycle  — task_started / task_updated / task_progress
#                            (these are rendered in SubagentBar, not the stream)
#   hideHookLifecycle      — hook_started / hook_progress / hook_response
#   hideRateLimitNotices   — rate_limit_event

hardFilters:
  hidePartialStreaming: false
  hideSubagentLifecycle: false
  hideHookLifecycle: false
  hideRateLimitNotices: false

# ─────────────────────────────────────────────────────────────────────────────
# DEBUG
# ─────────────────────────────────────────────────────────────────────────────

debug:
  showCardKindLabel: false   # when true, every card shows its kind id bottom-left
