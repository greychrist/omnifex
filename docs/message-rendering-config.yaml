# Message Rendering Config — Research Draft
#
# Purpose: capture the current message-rendering rules from StreamMessage.tsx,
# messageFilters.ts, and compactGrouping.ts in a single data file, so we can
# explore making the view layer config-driven (tweak without recompiling).
#
# Status: DESCRIPTIVE — reflects behavior as of 2026-04-22. Not yet wired into
# the renderer. Source-of-truth remains the TSX components; use this file to
# plan the extraction.
#
# Source files surveyed:
#   - src/components/StreamMessage.tsx           (primary renderer)
#   - src/components/ClaudeCodeSession.tsx       (viewMode state, line ~411)
#   - src/lib/messageFilters.ts                  (filterDisplayableMessages)
#   - src/lib/compactGrouping.ts                 (boundary detection)
#   - src/components/tools/*.tsx                 (per-tool widgets)
#
# ─────────────────────────────────────────────────────────────────────────────
# SCHEMA
# ─────────────────────────────────────────────────────────────────────────────
#
# Each entry under `messageKinds` describes one visually-distinct message
# variant. Fields:
#
#   id:            Stable slug for the kind. Used as config key.
#   match:         Discriminator. All listed conditions must hold (AND).
#                  Expressed as message-path predicates:
#                    type          - top-level message.type
#                    subtype       - message.subtype (for system msgs)
#                    contentType   - content block .type
#                    roleHint      - 'user' | 'assistant' | 'system' | 'tool'
#                    flags         - boolean predicates on the message
#                    textPattern   - regex / substring match on content
#   classify:      How the app categorizes the message.
#                    origin      : 'user' | 'assistant' | 'system' | 'tool' | 'subagent'
#                    isBoundary  : if true, always shown in compact mode
#                    isMeta      : internal marker; never rendered
#   visual:
#     icon         : Lucide component name OR unicode glyph (prefix "lucide:" / "glyph:")
#     label        : Header text (may be null for inline-only)
#     accentColor  : tailwind token family (primary | blue | amber | green | red | gray | muted)
#     align        : 'left' | 'right' | 'full'
#     widget       : Optional named widget that owns the body (bypasses default render)
#   compact:
#     hidden       : true if this kind is collapsed into CollapsibleGroup in compact mode
#     promoteIf    : Optional condition under which a normally-hidden kind is promoted
#                    to boundary (e.g. "latest TodoWrite in turn")
#   notes:         Free-form caveats / edge cases.
#
# ─────────────────────────────────────────────────────────────────────────────
# GLOBAL SETTINGS
# ─────────────────────────────────────────────────────────────────────────────

version: 1

viewModes:
  compact:
    description: Collapses interior turn content; shows only boundary messages.
    default: false
  verbose:
    description: Shows every displayable message in order.
    default: true

# Hard filters applied before any rendering (messageFilters.ts).
globalFilters:
  - id: drop-meta
    when: { flags: [isMeta] }
    unless: { anyOf: [{ has: leafUuid }, { has: summary }] }
    reason: Internal SDK markers; never useful to render.
  - id: drop-task-lifecycle
    when: { type: system, subtypePrefix: task_ }
    reason: Rendered in SubagentBar, not main stream.
  - id: drop-empty-user
    when: { type: user, contentEmpty: true }
    reason: Placeholder user messages from SDK with no content.

# Accent color palette — change once, propagates to all kinds that reference it.
palette:
  primary:    { border: "primary/20",      bg: "primary/5" }        # assistant
  blue:       { border: "blue-400/30",     bg: "rgba(96,165,250,0.10)" }   # user
  amber:      { border: "amber-500/30",    bg: "rgba(245,158,11,0.12)" }   # subagent prompt
  green:      { border: "green-500/20",    bg: "green-500/5" }      # success result
  red:        { border: "destructive/20",  bg: "destructive/5" }    # error result
  gray:       { border: "gray-500/20",     bg: "gray-500/5" }       # system context
  muted:      { border: "border/30",       bg: "muted/30" }         # tool result
  info:       { border: "muted-foreground/30", bg: null }           # SDK system msgs
  sysInit:    { border: "blue-500/20",     bg: "blue-500/5" }       # system init

# ─────────────────────────────────────────────────────────────────────────────
# MESSAGE KINDS
# ─────────────────────────────────────────────────────────────────────────────

messageKinds:

  # ── USER ──────────────────────────────────────────────────────────────────

  - id: user.prompt
    match:
      type: user
      contentType: text
      flags: { not: [isMeta, parent_tool_use_id] }
    classify: { origin: user, isBoundary: true }
    visual:
      icon: lucide:User
      label: "You"
      accentColor: blue
      align: right
    compact: { hidden: false }
    notes: >
      Right-aligned card. Supports @/path image attachments and
      <command-name>/<command-args> markup extraction.

  - id: user.image
    match:
      type: user
      contentType: image
      flags: [sourceIsBase64]
    classify: { origin: user, isBoundary: true }
    visual:
      icon: null
      label: "Pasted image"
      accentColor: blue
      align: right
    compact: { hidden: false }

  - id: user.subagentPrompt
    match:
      type: user
      flags: [hasParentToolUseId]
      notFlags: [isToolResultOnly]
    classify: { origin: subagent, isBoundary: true }
    visual:
      icon: lucide:Bot
      label: null
      accentColor: amber
      align: left
    compact: { hidden: false }
    notes: Amber tint distinguishes SDK-spawned subagent prompts from real user input.

  - id: user.sdkSystemBracket
    match:
      type: user
      contentType: text
      textPattern: "^\\[.{0,200}\\]$"
    classify: { origin: system, isBoundary: false }
    visual:
      icon: "glyph:ℹ"
      label: "SDK System Message"
      accentColor: info
      align: full
    compact: { hidden: true }
    notes: Matches "[Request interrupted by user]", "[Session resumed]", etc.

  - id: user.systemContext
    match:
      type: user
      contentType: text
      textContains:
        anyOf: ["<system-reminder>", "Base directory for this skill:", "CLAUDE.md"]
    classify: { origin: system, isBoundary: false }
    visual:
      icon: lucide:Info
      label: "System Context"    # or "Skill: ...", "CLAUDE.md Context", "System Reminder"
      accentColor: gray
      align: full
      widget: SystemWidget
    compact: { hidden: false }
    notes: Collapsible. Label derived from content sniffing in SystemWidget.

  # ── ASSISTANT ─────────────────────────────────────────────────────────────

  - id: assistant.text
    match:
      type: assistant
      contentType: text
    classify: { origin: assistant, isBoundary: true }
    visual:
      icon: lucide:Bot
      label: null
      accentColor: primary
      align: left
    compact: { hidden: false }
    notes: >
      Boundary only when stop_reason === 'end_turn' OR the message has text
      content and no non-text blocks (see compactGrouping.ts:24-31).

  - id: assistant.thinking
    match:
      type: assistant
      contentType: thinking
    classify: { origin: assistant, isBoundary: false }
    visual:
      icon: null
      label: null
      accentColor: primary
      align: left
      widget: ThinkingWidget
    compact: { hidden: true }

  - id: assistant.toolUse
    match:
      type: assistant
      contentType: tool_use
    classify: { origin: tool, isBoundary: false }
    visual:
      icon: null        # per-tool widgets own icon
      label: null
      accentColor: primary
      align: left
      widget: "@tool"   # dispatch via toolWidgets map below
    compact:
      hidden: true
      promoteIf: "isLatestTodoWriteInTurn"   # see compactGrouping.ts:45-50
    notes: See `toolWidgets` section for per-tool dispatch.

  # ── TOOL RESULTS (carried on user messages) ──────────────────────────────

  - id: tool.result.generic
    match:
      type: user
      contentType: tool_result
    classify: { origin: tool, isBoundary: false }
    visual:
      icon: lucide:Terminal
      label: "Tool Result"
      accentColor: muted
      align: left
    compact:
      hidden: true
      hideWhenPairedWith: assistant.toolUse   # suppressed if widget already rendered
    notes: >
      Several sub-variants are sniffed from text content and relabeled:
        - "Edit Result"      when body contains "has been updated"
        - "MultiEdit Result" when body contains "multiple edits"
        - "Directory Contents" + tree for LS-shaped results
        - "Read Result" when body has "line →" pattern
        - Empty → "Tool did not return any output"
      is_error=true adds red AlertCircle; otherwise green CheckCircle2.

  - id: tool.result.systemReminder
    match:
      type: user
      contentType: tool_result
      textContains: "<system-reminder>"
    classify: { origin: system, isBoundary: false }
    visual:
      icon: lucide:Info
      label: "System Reminder"
      accentColor: gray
      widget: SystemReminderWidget
    compact: { hidden: true }

  # ── RESULT (final turn output) ───────────────────────────────────────────

  - id: result.success
    match:
      type: result
      flags: { not: [is_error] }
    classify: { origin: system, isBoundary: true }
    visual:
      icon: lucide:CheckCircle2
      label: "Execution Complete"
      accentColor: green
      align: full
    compact: { hidden: false }
    notes: Shows cost (hidden for 'max' account), duration, turns, tokens.

  - id: result.error
    match:
      type: result
      flags: [is_error]
    classify: { origin: system, isBoundary: true }
    visual:
      icon: lucide:AlertCircle
      label: "Execution Failed"
      accentColor: red
      align: full
    compact: { hidden: false }

  # ── SYSTEM ───────────────────────────────────────────────────────────────

  - id: system.init
    match: { type: system, subtype: init }
    classify: { origin: system, isBoundary: false }
    visual:
      icon: lucide:Settings
      label: "System Initialized"
      accentColor: sysInit
      align: full
      widget: SystemInitWidget
    compact: { hidden: true }
    notes: Session ID, model, cwd, tool registry (regular + MCP grouped).

  - id: system.notification.error
    match: { type: system, subtype: notification, notification_type: [error, error_api, error_rate_limit] }
    classify: { origin: system, isBoundary: false }
    visual:
      icon: "glyph:✗"
      label: null
      accentColor: red
      align: full
    compact: { hidden: false }

  - id: system.notification.stop
    match: { type: system, subtype: notification, notification_type: stop }
    classify: { origin: system, isBoundary: false }
    visual:
      icon: lucide:CircleStop
      label: null
      accentColor: red
    compact: { hidden: false }

  - id: system.notification.warn
    match: { type: system, subtype: notification, notification_type: warn }
    classify: { origin: system, isBoundary: false }
    visual:
      icon: "glyph:⚠"
      label: null
      accentColor: info   # yellow-ish; swap palette entry if desired
    compact: { hidden: false }

  - id: system.notification.info
    match: { type: system, subtype: notification, notification_type: info }
    classify: { origin: system, isBoundary: false }
    visual:
      icon: null
      label: null
      accentColor: info
    compact: { hidden: true }

  - id: system.compactBoundary
    match: { type: system, subtype: compact_boundary }
    classify: { origin: system, isMeta: true }
    visual: { icon: null, label: null, widget: null }
    compact: { hidden: true }
    notes: SDK context-compaction marker. Currently never rendered.

  # ── PERMISSION / SUMMARY ─────────────────────────────────────────────────

  - id: permission.request
    match: { type: permission_request }
    classify: { origin: system, isBoundary: true }
    visual:
      icon: null
      label: null
      widget: PermissionDialog
      align: full
    compact: { hidden: false }

  - id: summary.compaction
    match:
      flags: [hasLeafUuid, hasSummary]
      type: summary
    classify: { origin: system, isBoundary: true }
    visual:
      icon: null
      label: null
      widget: SummaryWidget
    compact: { hidden: false }

# ─────────────────────────────────────────────────────────────────────────────
# TOOL WIDGET DISPATCH
# ─────────────────────────────────────────────────────────────────────────────
# When a message kind has widget: "@tool", dispatch on tool_use.name.
# Names are lowercased before lookup. Unknown tools use `fallback`.

toolWidgets:
  task:       { widget: TaskWidget,       icon: lucide:ListTree }
  edit:       { widget: EditWidget,       icon: lucide:Pencil }
  multiedit:  { widget: MultiEditWidget,  icon: lucide:Pencil }
  todowrite:  { widget: TodoWidget,       icon: lucide:CheckSquare,  canBePromotedToBoundary: true }
  todoread:   { widget: TodoReadWidget,   icon: lucide:ListChecks }
  ls:         { widget: LSWidget,         icon: lucide:FolderTree }
  read:       { widget: ReadWidget,       icon: lucide:FileText }
  glob:       { widget: GlobWidget,       icon: lucide:Search }
  bash:       { widget: BashWidget,       icon: lucide:Terminal }
  write:      { widget: WriteWidget,      icon: lucide:FilePlus }
  grep:       { widget: GrepWidget,       icon: lucide:Search }
  websearch:  { widget: WebSearchWidget,  icon: lucide:Globe }
  webfetch:   { widget: WebFetchWidget,   icon: lucide:Download }
  # MCP tools match by prefix.
  "mcp__*":   { widget: MCPWidget,        icon: lucide:Plug }
  fallback:   { widget: null,             icon: lucide:Terminal,     label: "Tool" }

# ─────────────────────────────────────────────────────────────────────────────
# OPEN QUESTIONS FOR MAKING THIS LIVE
# ─────────────────────────────────────────────────────────────────────────────
#
# 1. Load location: ship the default as a bundled YAML and allow a user
#    override at `~/Library/Application Support/GreyChrist/message-rendering.yaml`?
#    Watch with chokidar so edits hot-reload in the renderer?
#
# 2. Predicate DSL: the `match` fields above assume a tiny evaluator
#    (type/subtype equality, flag presence, regex). Need to decide how
#    expressive to make it vs. keeping a fixed set of predicates.
#
# 3. Icon resolution: Lucide icons are tree-shaken at build time today. Moving
#    to config means either (a) pre-importing every Lucide icon used here
#    (inflates bundle), or (b) an allow-list of icons the renderer knows.
#    Option (b) is probably right — keeps bundle lean, config references
#    symbolic names.
#
# 4. Widgets: these stay in TSX; config only references them by name. If a
#    config references a widget that doesn't exist, fall back to default
#    rendering and log once.
#
# 5. Compact-mode promotion (`isLatestTodoWriteInTurn`) is the one place
#    where the rule isn't a pure predicate over a single message — it needs
#    turn context. Keep that logic in compactGrouping.ts; config just flags
#    kinds as "promotable".
#
# 6. Account-scoped overrides? Probably overkill for v1 — start with a
#    single global config file.
